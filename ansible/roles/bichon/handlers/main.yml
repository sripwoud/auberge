---
- name: Restart bichon
  ansible.builtin.systemd_service:
    name: bichon
    state: restarted
    daemon_reload: true

- name: Restart caddy
  ansible.builtin.systemd_service:
    name: caddy
    state: restarted
    daemon_reload: true

- name: Restart bichon-archive timer
  ansible.builtin.systemd_service:
    name: bichon-archive.timer
    state: restarted
    daemon_reload: true
