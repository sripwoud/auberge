---
- name: Restart cockpit
  ansible.builtin.systemd_service:
    name: cockpit.socket
    state: restarted
    daemon_reload: true

- name: Apply netplan
  ansible.builtin.command:
    cmd: netplan apply
  async: 120
  poll: 0
  changed_when: true

- name: Restart caddy
  ansible.builtin.systemd_service:
    name: caddy
    state: restarted
    daemon_reload: true
