grimmory_install_path: /opt/grimmory
grimmory_data_path: /srv/grimmory
grimmory_bookdrop_path: /srv/bookdrop
grimmory_sys_user: grimmory
grimmory_sys_group: grimmory
grimmory_port: 6060
grimmory_domain: "{{ grimmory_subdomain }}.{{ domain }}"

grimmory_db_host: "127.0.0.1"
grimmory_db_name: grimmory
grimmory_db_user: grimmory

grimmory_admin_name: "{{ grimmory_admin_user }}"
grimmory_admin_email: "{{ grimmory_admin_user }}@{{ domain }}"

grimmory_github_repo: grimmory-tools/grimmory
grimmory_version: "2.3.0"
grimmory_jar_url: "https://github.com/sripwoud/auberge/releases/download/grimmory/v{{ grimmory_version }}/grimmory-api.jar"
grimmory_jvm_opts: "-Xmx768m -XX:+UseShenandoahGC -XX:+ExitOnOutOfMemoryError"

grimmory_java_major: "25"
grimmory_java_home: "/opt/java/temurin-{{ grimmory_java_major }}-jre"
grimmory_java_url: "https://api.adoptium.net/v3/binary/latest/{{ grimmory_java_major }}/ga/linux/x64/jre/hotspot/normal/eclipse"
