---
- name: Self-hosted Applications - Layer 3
  hosts: vps
  become: true
  roles:
    - role: baikal
      tags: [apps, storage, caldav, baikal]
    - role: bichon
      tags: [apps, storage, email, bichon]
    - role: blocky
      tags: [apps, network, dns, blocky]
      vars:
        blocky_tailscale_bound_domains:
          - "{{ cockpit_subdomain | default('cockpit') }}.{{ domain }}"
          - "{{ paperless_subdomain | default('paperless') }}.{{ domain }}"
    - role: booklore
      tags: [apps, storage, media, books, booklore]
    - role: cockpit
      tags: [apps, monitoring, cockpit]
    - role: colporteur
      tags: [apps, web, rss, colporteur]
    - role: freshrss
      tags: [apps, web, rss, freshrss]
    - role: navidrome
      tags: [apps, storage, media, music, navidrome]
    - role: paperless
      tags: [apps, storage, documents, paperless]
    - role: openclaw
      tags: [apps, ai, openclaw]
    - role: vdirsyncer
      tags: [apps, sync, calendar, vdirsyncer]
    - role: syncthing
      tags: [apps, sync, syncthing]
    - role: webdav
      tags: [apps, storage, webdav]
    - role: wireguard
      tags: [apps, network, vpn, wireguard]
    - role: yourls
      tags: [apps, web, url-shortener, yourls]
